name: Render video

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # 1) Compute total frames dynamically and split into 4 equal chunks
  # ---------------------------------------------------------------
  setup:
    name: Plan chunks
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calc.outputs.matrix }}
      total: ${{ steps.calc.outputs.total }}
    steps:
      - uses: actions/checkout@v4
      - id: calc
        run: |
          TOTAL=$(node -e "const d=require('./src/scenes.json');process.stdout.write(String(d.introFrames+d.totalFrames))")
          echo "Total frames: $TOTAL"
          Q=$(( (TOTAL + 3) / 4 ))
          MATRIX="["
          FIRST=1
          for i in 0 1 2 3; do
            START=$(( i * Q ))
            if [ $START -gt $((TOTAL-1)) ]; then continue; fi
            END=$(( START + Q - 1 ))
            if [ $END -gt $((TOTAL-1)) ]; then END=$((TOTAL-1)); fi
            if [ $FIRST -eq 0 ]; then MATRIX="$MATRIX,"; fi
            MATRIX="$MATRIX{\"index\":$i,\"start\":$START,\"end\":$END}"
            FIRST=0
          done
          MATRIX="$MATRIX]"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  # ---------------------------------------------------------------
  # 2) Render 4 chunks in parallel (one runner each)
  # ---------------------------------------------------------------
  render:
    name: Render chunk ${{ matrix.chunk.index }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        chunk: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0t64 libgbm-dev libasound2t64 \
            libxrandr2 libxkbcommon-dev libxfixes3 libxcomposite1 libxdamage1 \
            libatk-bridge2.0-0t64 libpango-1.0-0 libcairo2 libcups2t64

      - name: Install dependencies
        run: npm ci

      - name: Render chunk ${{ matrix.chunk.index }} (frames ${{ matrix.chunk.start }}-${{ matrix.chunk.end }})
        run: |
          npx remotion render Main "chunk_${{ matrix.chunk.index }}.mp4" \
            --frames=${{ matrix.chunk.start }}-${{ matrix.chunk.end }} \
            --codec=h264 --crf=18 --concurrency=4 --gl=swiftshader \
            --image-format=jpeg --jpeg-quality=95

      - name: Upload chunk
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk.index }}
          path: chunk_${{ matrix.chunk.index }}.mp4
          if-no-files-found: error

  # ---------------------------------------------------------------
  # 3) Combine all chunks once every render job finishes
  # ---------------------------------------------------------------
  combine:
    name: Combine chunks
    needs: render
    runs-on: ubuntu-latest
    steps:
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          path: chunks
          merge-multiple: true

      - name: Build concat list (ordered)
        run: |
          ls -1 chunks/chunk_*.mp4 | sort -V | sed "s|^|file '|; s|$|'|" > chunks.txt
          echo "----- chunks.txt -----"
          cat chunks.txt

      - name: Concatenate into final video
        run: ffmpeg -y -f concat -safe 0 -i chunks.txt -c copy final_video.mp4

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: predators_final_video
          path: final_video.mp4
          if-no-files-found: error
