name: Render video

on:
  workflow_dispatch:

jobs:
  render:
    name: Render video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libdbus-1-3 \
            libatk1.0-0 \
            libgbm-dev \
            libasound2 \
            libxrandr2 \
            libxkbcommon-dev \
            libxfixes3 \
            libxcomposite1 \
            libxdamage1 \
            libatk-bridge2.0-0 \
            libpango-1.0-0 \
            libcairo2 \
            libcups2

      - name: Install dependencies
        run: npm ci

      - name: Render video
        run: npx remotion render Main out/final_video.mp4 --image-format=jpeg --jpeg-quality=95 --concurrency=12 --gl=angle

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: final_video
          path: out/final_video.mp4
          if-no-files-found: error
